# goreleaser config (or-c6zf.6). Runs ONLY from the tag-triggered release
# workflow (or `goreleaser release --snapshot` locally). CGO-free by
# construction — Orion's embedder and store are pure Go.
version: 2

builds:
  - id: orion
    main: ./cmd/orion
    binary: orion
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: orion
    formats: [tar.gz]
    name_template: "orion_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^test"

release:
  draft: true # a human clicks publish — releases are outward-facing

# goreleaser config (or-c6zf.6). Runs ONLY from the tag-triggered release
# workflow (or `goreleaser release --snapshot` locally). CGO-free by
# construction — Orion's embedder and store are pure Go.
version: 2

builds:
  - id: orion
    main: ./cmd/orion
    binary: orion
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    # Reproducible builds: -trimpath strips absolute paths and mod_timestamp
    # pins the binary mtime to the commit, so every run of a given tag produces
    # BYTE-IDENTICAL archives → identical checksums. This guarantees the
    # Homebrew cask (pushed during a run) always matches the published release
    # assets, no matter how many times the release workflow runs for a tag.
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: orion
    formats: [tar.gz]
    name_template: "orion_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^test"

release:
  draft: true # a human clicks publish — releases are outward-facing

# Homebrew distribution via the org's self-hosted tap (same pattern as
# rvl-cli). Install: `brew install revelara-ai/tap/orion`.
#
# Requires a HOMEBREW_TAP_TOKEN secret (a PAT with contents:write on
# revelara-ai/homebrew-tap) exported into the release job env — the default
# GITHUB_TOKEN only has access to this repo, not the tap.
homebrew_casks:
  - name: orion
    binaries:
      - orion
    repository:
      owner: revelara-ai
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://revelara.ai"
    description: "The reliability layer of the agentic SDLC — a proof-gated harness from intent to independently proven software"
    commit_author:
      name: revelara-release-bot
      email: release@revelara.ai
    commit_msg_template: "brew: orion {{ .Tag }}"
    # Skip publishing the cask for pre-releases.
    skip_upload: auto
    # Not Apple-notarised: strip the Gatekeeper quarantine attribute on
    # install (no-op on Linux brew).
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/orion"]
          end

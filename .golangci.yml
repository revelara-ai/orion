version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    revive:
      rules:
        - name: exported
          arguments: ["disableStutteringCheck"]
  exclusions:
    rules:
      # `package version` is the canonical name for build-time version metadata
      # in Go projects (k8s, helm, etc. all use it); revive's stdlib-collision
      # warning is a false positive here.
      - path: internal/version/
        linters:
          - revive
        text: "var-naming: avoid package names"

formatters:
  enable:
    - gofmt
    - goimports

apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: orion

build:
  local:
    push: false        # minikube uses the local Docker daemon
    useBuildkit: true
  artifacts:
    - image: orion
      docker:
        dockerfile: Dockerfile
        # Build-time version metadata is injected via Dockerfile ARG defaults
        # (Version=dev, Commit=none, BuildDate=unknown). For tagged release
        # builds, use `make docker-build VERSION=v0.1.0` outside of skaffold.

manifests:
  kustomize:
    paths:
      - k8s/base

deploy:
  kubectl: {}

portForward:
  - resourceType: service
    resourceName: orion
    port: 8080
    localPort: 8080

# Orion CI: one fast lane — lint + short tests — on every PR and main push.
# No separate build step (the tests compile everything); no scheduled heavy
# lane (the full generate→prove suite is `make test`, run locally and before
# a release). Releases are release.yml: a human pushes a v* tag, goreleaser
# builds and drafts.
#
# bubblewrap: the proof sandbox (internal/sandbox, proofexec) is exercised by
# several SHORT tests too. Ubuntu 24.04 runners block unprivileged user
# namespaces via AppArmor by default; the sysctl is the documented mitigation.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # manual: run the full heavy suite on demand (full-suite job)

permissions:
  contents: read

jobs:
  ci:
    name: vet / lint / test-short
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go (from go.mod)
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Install bubblewrap (proof sandbox)
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Vet
        run: make vet

      - name: Lint (golangci-lint v2, full)
        # Ordered before the tests (fast feedback); the action installs a
        # prebuilt binary and caches analysis. `latest` because the lint
        # binary's own Go build must be >= the repo's go directive (a binary
        # built with an older Go refuses the target outright).
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Test (short lane)
        run: make test-short

  full-suite:
    name: full suite (manual only)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go (from go.mod)
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Install bubblewrap (proof sandbox)
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Full test suite (sequential heavy packages)
        # test-ci runs packages SEQUENTIALLY: every heavy proof package waits
        # on the same machine-wide proof flock, so parallel packages on a
        # small runner starve each other into per-test deadline failures.
        # TestV20Loop (the North-Star harness) is evaluated out-of-band via
        # the deferredPredicates ratchet, never a CI gate.
        run: ORION_RUN_ACCEPTANCE=false make test-ci

# Release (or-c6zf.6): triggered ONLY by a human pushing a v* tag. Builds
# cross-platform archives with goreleaser, publishes a DRAFT GitHub release
# (a human clicks publish), and attests build provenance — dogfooding the
# supply-chain standard Orion's own dependencyprovenance module preaches.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release
  id-token: write # SLSA provenance attestation
  attestations: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # goreleaser changelog needs history

      - name: Set up Go (from go.mod)
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        # Attestations are unavailable on PRIVATE repos (plan-gated), so a
        # pre-flip test tag would red the whole release for a reason that
        # self-resolves at flip time. Public repo → the step is REQUIRED (the
        # supply-chain posture Orion's own dependencyprovenance preaches).
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/checksums.txt

name: Bug report
description: Something Orion did wrong — a crash, a wrong verdict, a stuck loop.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Include the command (e.g. `orion change "..."`) and the observable failure.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Smallest repo/intent that reproduces it. `orion --version`, OS, Go version.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
